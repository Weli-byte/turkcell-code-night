<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Gamification Engine — Giriş</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet" href="css/main.css" />
  <style>
    .auth-wrap {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      z-index: 1;
      padding: 24px;
    }
    .auth-card {
      width: 100%;
      max-width: 420px;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.09);
      border-radius: 20px;
      padding: 48px 40px;
      backdrop-filter: blur(24px);
      position: relative;
      overflow: hidden;
    }
    .auth-card::before {
      content: '';
      position: absolute;
      top: -60px; left: -60px;
      width: 200px; height: 200px;
      background: radial-gradient(circle, rgba(0,255,135,0.12) 0%, transparent 70%);
      pointer-events: none;
    }
    .auth-logo {
      font-family: 'Syne', sans-serif;
      font-size: 26px;
      font-weight: 800;
      letter-spacing: -0.04em;
      background: linear-gradient(90deg, #00FF87, #00D4FF);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 8px;
    }
    .auth-tagline {
      font-size: 13px;
      color: var(--text-muted);
      margin-bottom: 36px;
    }
    .tab-row {
      display: flex;
      background: rgba(255,255,255,0.04);
      border-radius: 10px;
      padding: 3px;
      margin-bottom: 32px;
      border: 1px solid var(--border);
    }
    .tab-btn {
      flex: 1;
      padding: 9px;
      background: transparent;
      border: none;
      border-radius: 8px;
      color: var(--text-muted);
      font-size: 13px;
      font-weight: 500;
      transition: background 0.2s, color 0.2s;
    }
    .tab-btn.active {
      background: rgba(0,255,135,0.1);
      color: var(--accent-1);
    }
    .auth-form { display: flex; flex-direction: column; gap: 18px; }
    .auth-form.hidden { display: none; }
    .error-msg {
      font-size: 13px;
      color: var(--danger);
      background: rgba(255,77,77,0.08);
      border: 1px solid rgba(255,77,77,0.2);
      border-radius: 8px;
      padding: 10px 14px;
      display: none;
    }
    .error-msg.show { display: block; }
    .auth-submit {
      margin-top: 6px;
    }
    .auth-features {
      display: flex;
      gap: 20px;
      justify-content: center;
      margin-top: 28px;
    }
    .auth-feature {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      font-size: 11px;
      color: var(--text-muted);
      text-align: center;
    }
    .auth-feature .f-icon { font-size: 18px; }
  </style>
</head>
<body>
  <div class="noise-overlay"></div>
  <div class="cursor-dot"></div>
  <div class="cursor-halo"></div>
  <div class="bg-burst"></div>

  <div class="auth-wrap">
    <div class="auth-card">
      <div class="auth-logo">GE Engine</div>
      <div class="auth-tagline">Deterministik video platformu oyunlaştırma motoru</div>

      <div class="tab-row">
        <button class="tab-btn active" id="tab-login">Giriş Yap</button>
        <button class="tab-btn" id="tab-register">Kayıt Ol</button>
      </div>

      <!-- LOGIN -->
      <form class="auth-form" id="login-form">
        <div id="login-error" class="error-msg"></div>
        <div class="input-wrap">
          <label class="input-label">Kullanıcı Adı</label>
          <input type="text" id="login-username" placeholder="kullaniciadiniz" autocomplete="username" required />
        </div>
        <div class="input-wrap">
          <label class="input-label">Şifre</label>
          <input type="password" id="login-password" placeholder="••••••••" autocomplete="current-password" required />
        </div>
        <button type="submit" class="btn-primary auth-submit">
          <span id="login-btn-text">Giriş Yap</span>
        </button>
      </form>

      <!-- REGISTER -->
      <form class="auth-form hidden" id="register-form">
        <div id="reg-error" class="error-msg"></div>
        <div class="input-wrap">
          <label class="input-label">Kullanıcı Adı</label>
          <input type="text" id="reg-username" placeholder="kullaniciadiniz" autocomplete="username" required />
        </div>
        <div class="input-wrap">
          <label class="input-label">Şifre</label>
          <input type="password" id="reg-password" placeholder="min. 6 karakter" autocomplete="new-password" required />
        </div>
        <button type="submit" class="btn-primary auth-submit">
          <span id="reg-btn-text">Hesap Oluştur</span>
        </button>
      </form>

      <div class="auth-features">
        <div class="auth-feature"><span class="f-icon">🏆</span>Skor Tablosu</div>
        <div class="auth-feature"><span class="f-icon">🤖</span>AI Asistan</div>
        <div class="auth-feature"><span class="f-icon">⚡</span>Puan Sistemi</div>
        <div class="auth-feature"><span class="f-icon">🎯</span>Görevler</div>
      </div>
    </div>
  </div>

  <script src="js/api.js"></script>
  <script src="js/global.js"></script>
  <script>
    // Zaten giriş yapmışsa kataloğa yönlendir
    if (Auth.isLoggedIn()) window.location.href = 'catalog.html';

    initCursor();

    // TAB SWITCH
    const tabLogin    = document.getElementById('tab-login');
    const tabRegister = document.getElementById('tab-register');
    const loginForm   = document.getElementById('login-form');
    const regForm     = document.getElementById('register-form');

    tabLogin.addEventListener('click', () => {
      tabLogin.classList.add('active');
      tabRegister.classList.remove('active');
      loginForm.classList.remove('hidden');
      regForm.classList.add('hidden');
    });

    tabRegister.addEventListener('click', () => {
      tabRegister.classList.add('active');
      tabLogin.classList.remove('active');
      regForm.classList.remove('hidden');
      loginForm.classList.add('hidden');
    });

    // LOGIN
    loginForm.addEventListener('submit', async (e) => {
      e.preventDefault();
      const errEl  = document.getElementById('login-error');
      const btnTxt = document.getElementById('login-btn-text');
      errEl.classList.remove('show');
      btnTxt.textContent = 'Giriş yapılıyor…';

      try {
        const d = await API.login(
          document.getElementById('login-username').value.trim(),
          document.getElementById('login-password').value,
        );
        Auth.save(d.token, d.username, d.user_id, d.role || 'user');
        window.location.href = 'catalog.html';
      } catch (err) {
        errEl.textContent = err.message || 'Giriş başarısız';
        errEl.classList.add('show');
        btnTxt.textContent = 'Giriş Yap';
      }
    });

    // REGISTER
    regForm.addEventListener('submit', async (e) => {
      e.preventDefault();
      const errEl  = document.getElementById('reg-error');
      const btnTxt = document.getElementById('reg-btn-text');
      errEl.classList.remove('show');
      btnTxt.textContent = 'Oluşturuluyor…';

      try {
        const d = await API.register(
          document.getElementById('reg-username').value.trim(),
          document.getElementById('reg-password').value,
        );
        Auth.save(d.token, d.username, d.user_id, d.role || 'user');
        window.location.href = 'catalog.html';
      } catch (err) {
        errEl.textContent = err.message || 'Kayıt başarısız';
        errEl.classList.add('show');
        btnTxt.textContent = 'Hesap Oluştur';
      }
    });
  </script>
</body>
</html>
