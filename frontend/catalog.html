<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Katalog — Gamification Engine</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet" href="css/main.css" />
  <style>
    .catalog-hero {
      padding: 56px 0 32px;
      position: relative;
    }
    .catalog-hero h1 {
      font-size: 42px;
      font-weight: 800;
      letter-spacing: -0.04em;
      margin-bottom: 10px;
    }
    .catalog-hero p {
      color: var(--text-muted);
      font-size: 15px;
      max-width: 500px;
    }
    .filter-bar {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 32px;
      flex-wrap: wrap;
    }
    .filter-chip {
      font-size: 13px;
      font-weight: 500;
      color: var(--text-2);
      background: rgba(255,255,255,0.05);
      border: 1px solid var(--border);
      border-radius: 100px;
      padding: 6px 16px;
      transition: background 0.2s, color 0.2s, border-color 0.2s;
    }
    .filter-chip.active,
    .filter-chip:hover {
      background: rgba(0,255,135,0.08);
      color: var(--accent-1);
      border-color: var(--border-acc);
    }
    .search-input {
      flex: 1;
      min-width: 180px;
      max-width: 300px;
    }
    .skeleton {
      background: rgba(255,255,255,0.05);
      border-radius: var(--radius);
      animation: skeleton-pulse 1.6s ease-in-out infinite;
    }
    @keyframes skeleton-pulse {
      0%, 100% { opacity: 0.5; }
      50%       { opacity: 1;   }
    }
    .skeleton-thumb { aspect-ratio: 16/9; width: 100%; }
    .skeleton-info  { height: 16px; margin: 12px 14px 6px; }
    .skeleton-meta  { height: 10px; margin: 0 14px 14px; width: 60%; }

    .series-section { margin-bottom: 48px; }
    .series-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 11px;
      color: var(--accent-2);
      background: rgba(0,212,255,0.08);
      border: 1px solid rgba(0,212,255,0.2);
      border-radius: 100px;
      padding: 3px 10px;
      margin-bottom: 16px;
      letter-spacing: 0.04em;
    }

    /* AI Recommendations strip */
    .rec-section {
      margin-bottom: 40px;
      background: linear-gradient(135deg, rgba(108,0,255,0.06) 0%, rgba(0,255,135,0.04) 100%);
      border: 1px solid var(--border-acc);
      border-radius: var(--radius);
      padding: 24px 28px;
    }
    .rec-header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 14px;
    }
    .rec-badge {
      font-size: 10px;
      color: var(--accent-2);
      background: rgba(0,212,255,0.1);
      border: 1px solid rgba(0,212,255,0.25);
      border-radius: 100px;
      padding: 2px 10px;
      letter-spacing: 0.05em;
    }
    .rec-answer {
      font-size: 14px;
      color: var(--text-2);
      line-height: 1.65;
      margin-bottom: 18px;
      display: none;
    }
    .rec-answer.show { display: block; }
    .rec-grid {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
    }
    .rec-card {
      display: flex;
      align-items: center;
      gap: 12px;
      background: rgba(255,255,255,0.03);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 10px 14px;
      cursor: pointer;
      transition: border-color 0.2s, background 0.2s;
      text-decoration: none;
    }
    .rec-card:hover {
      border-color: var(--border-acc);
      background: rgba(0,255,135,0.05);
    }
    .rec-card-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: var(--accent-1);
      flex-shrink: 0;
    }
    .rec-card-title { font-size: 13px; font-weight: 600; color: var(--text-1); }
    .rec-card-meta  { font-size: 11px; color: var(--text-muted); margin-top: 2px; }

    .thumb-gradient {
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg,
        rgba(108,0,255,0.25) 0%,
        rgba(0,255,135,0.12) 100%);
    }
    .video-duration-badge {
      position: absolute;
      bottom: 8px;
      right: 8px;
      background: rgba(0,0,0,0.7);
      border-radius: 4px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 10px;
      color: #fff;
      padding: 2px 6px;
    }
  </style>
  <!-- GSAP + Lenis CDN -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/ScrollTrigger.min.js"></script>
  <script src="https://unpkg.com/lenis@1.1.14/dist/lenis.min.js"></script>
</head>
<body>
  <div id="scroll-progress"></div>
  <div class="noise-overlay"></div>
  <div class="cursor-dot"></div>
  <div class="cursor-halo"></div>
  <div class="bg-burst"></div>

  <!-- NAVBAR -->
  <nav class="navbar">
    <a href="catalog.html" class="nav-logo">GE Engine</a>
    <ul class="nav-links">
      <li><a href="catalog.html">Katalog</a></li>
      <li><a href="panel.html">Panelim</a></li>
      <li><a href="leaderboard.html">Sıralama</a></li>
      <li id="nav-admin-link" style="display:none"><a href="admin.html">Admin</a></li>
    </ul>
    <div class="nav-right">
      <div class="points-pill" id="nav-points">⚡ — puan</div>
      <span class="nav-username" id="nav-username"></span>
      <a class="nav-logout" id="nav-logout" href="#">Çıkış</a>
    </div>
  </nav>

  <div class="page-content">
    <div class="container">
      <div class="catalog-hero will-animate">
        <h1>Video <span class="text-gradient">Kataloğu</span></h1>
        <p>İzle, puan kazan, rozetler topla. Her video bir fırsat.</p>
      </div>

      <!-- AI RECOMMENDATIONS -->
      <div class="rec-section will-animate" id="rec-section" style="display:none">
        <div class="rec-header">
          <span style="font-size:16px">✨</span>
          <span style="font-size:14px;font-weight:700;color:var(--text-1)">Sana Özel</span>
          <span class="rec-badge" id="rec-badge">AI</span>
        </div>
        <div class="rec-answer" id="rec-answer"></div>
        <div class="rec-grid" id="rec-grid"></div>
      </div>

      <!-- FILTER BAR -->
      <div class="filter-bar will-animate">
        <input class="search-input" type="text" id="search-input" placeholder="Video ara…" />
        <button class="filter-chip active" data-genre="all">Tümü</button>
        <button class="filter-chip" data-genre="animasyon">Animasyon</button>
        <button class="filter-chip" data-genre="bilim-kurgu">Bilim Kurgu</button>
        <button class="filter-chip" data-genre="fantastik">Fantastik</button>
        <button class="filter-chip" data-genre="macera">Macera</button>
        <button class="filter-chip" data-genre="belgesel">Belgesel</button>
        <button class="filter-chip" data-genre="otomobil">Otomobil</button>
      </div>

      <!-- CONTENT -->
      <div id="catalog-root"></div>
    </div>
  </div>

  <div id="toast-container"></div>

  <script src="js/api.js"></script>
  <script src="js/global.js"></script>
  <script src="js/notifications.js"></script>
  <script>
    initPage();
    initNotifications();

    // Show admin link if admin
    if (Auth.getRole() === 'admin') {
      document.getElementById('nav-admin-link').style.display = '';
    }

    // --- CATALOG RENDER ---
    let allVideos = [];
    let activeSeries = [];
    let currentGenre = 'all';
    let currentSearch = '';

    const root = document.getElementById('catalog-root');

    function makeSkeletons(n) {
      return Array.from({length: n}, () => `
        <div class="video-card">
          <div class="skeleton skeleton-thumb"></div>
          <div class="skeleton skeleton-info"></div>
          <div class="skeleton skeleton-meta"></div>
        </div>`).join('');
    }

    function renderCatalog() {
      let videos = allVideos;
      if (currentGenre !== 'all') {
        videos = videos.filter(v =>
          (v.genre || v.genres || '').toLowerCase().includes(currentGenre));
      }
      if (currentSearch.trim()) {
        const q = currentSearch.toLowerCase();
        videos = videos.filter(v => v.title?.toLowerCase().includes(q));
      }

      if (videos.length === 0) {
        root.innerHTML = `<div class="empty-state">
          <div class="icon">🎬</div><p>Bu filtreyle video bulunamadı.</p>
        </div>`;
        return;
      }

      // Group by series
      const bySeriesId = {};
      const noSeries   = [];
      videos.forEach(v => {
        if (v.series_id) {
          (bySeriesId[v.series_id] = bySeriesId[v.series_id] || []).push(v);
        } else {
          noSeries.push(v);
        }
      });

      let html = '';

      // Named series
      activeSeries.forEach(s => {
        const vids = bySeriesId[s.id];
        if (!vids || !vids.length) return;
        html += `
          <div class="series-section" data-stagger>
            <div class="section-header">
              <div>
                <div class="series-badge">📺 Seri</div>
                <h2 class="section-title">${s.title || s.name || 'Seri'}</h2>
                ${s.description ? `<p class="section-subtitle">${s.description}</p>` : ''}
              </div>
            </div>
            <div class="video-grid">
              ${vids.map(v => videoCard(v)).join('')}
            </div>
          </div>`;
      });

      // Standalone
      if (noSeries.length) {
        html += `
          <div class="series-section" data-stagger>
            <div class="section-header">
              <div><h2 class="section-title">Tekil Videolar</h2></div>
            </div>
            <div class="video-grid">
              ${noSeries.map(v => videoCard(v)).join('')}
            </div>
          </div>`;
      }

      root.innerHTML = html;
      initAnimations();
      initCursor();
    }

    function videoCard(v) {
      const durationMin = v.duration_minutes ? Math.round(v.duration_minutes) : '?';
      const genre = v.genre || v.genres || '';
      const colors = ['#6C00FF','#00FF87','#00D4FF','#FF4D4D','#FFB800'];
      const color  = colors[v.id % colors.length] || '#6C00FF';
      return `
        <div class="video-card card-hover" onclick="window.location.href='watch.html?id=${v.id}'">
          <div class="video-thumb" style="background: linear-gradient(135deg, ${color}22 0%, #0D0D1800 100%);">
            <div class="thumb-gradient"></div>
            <div class="play-btn"><div class="play-icon"></div></div>
            <div class="video-duration-badge">${durationMin} dk</div>
          </div>
          <div class="video-info">
            <div class="video-title">${v.title || 'Başlıksız Video'}</div>
            <div class="video-meta">
              ${genre ? `<span class="genre-chip">${genre}</span>` : ''}
              ${v.episode_number ? `<span class="duration-chip">Bölüm ${v.episode_number}</span>` : ''}
            </div>
          </div>
        </div>`;
    }

    async function loadCatalog() {
      root.innerHTML = `<div class="video-grid">${makeSkeletons(6)}</div>`;
      try {
        const data = await API.getCatalog();
        allVideos   = data.videos || data || [];
        activeSeries = data.series  || [];
        renderCatalog();
      } catch (e) {
        root.innerHTML = `<div class="empty-state"><div class="icon">⚠️</div><p>${e.message}</p></div>`;
      }
    }

    // GENRE FILTER
    document.querySelectorAll('.filter-chip').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.filter-chip').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        currentGenre = btn.dataset.genre;
        renderCatalog();
      });
    });

    // SEARCH
    document.getElementById('search-input').addEventListener('input', (e) => {
      currentSearch = e.target.value;
      renderCatalog();
    });

    // AI RECOMMENDATIONS
    async function loadRecommendations() {
      try {
        const d = await API.getAIRecommendations();
        if (!d.videos || !d.videos.length) return;

        const sec     = document.getElementById('rec-section');
        const ansEl   = document.getElementById('rec-answer');
        const gridEl  = document.getElementById('rec-grid');
        const badgeEl = document.getElementById('rec-badge');

        ansEl.textContent = d.answer || '';
        ansEl.classList.add('show');
        badgeEl.textContent = d.llm_enhanced ? '⚡ GPT-4o' : 'AI';

        const COLORS = ['#6C00FF','#00FF87','#00D4FF','#FFB800','#FF4D4D'];
        gridEl.innerHTML = d.videos.map((v, i) => `
          <a class="rec-card" href="watch.html?id=${v.id}">
            <div class="rec-card-dot" style="background:${COLORS[i % COLORS.length]}"></div>
            <div>
              <div class="rec-card-title">${v.title}</div>
              <div class="rec-card-meta">${v.genre} · ${v.duration_minutes} dk</div>
            </div>
          </a>`).join('');

        sec.style.display = '';
        if (window.gsap) {
          gsap.from(sec, { opacity: 0, y: 20, duration: 0.5, ease: 'power3.out' });
        }
      } catch (_) {
        // Öneri yoksa sessizce geç
      }
    }

    loadCatalog();
    loadRecommendations();
  </script>
</body>
</html>
