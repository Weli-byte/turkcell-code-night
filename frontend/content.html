<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>İçerik — Gamification Engine</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet" href="css/main.css" />
  <style>
    /* HERO */
    .content-hero {
      display: flex; gap: 28px; align-items: flex-start;
      padding: 40px 0 28px; flex-wrap: wrap;
    }
    .content-thumb-lg {
      width: 320px; max-width: 100%; aspect-ratio: 16/9;
      border-radius: var(--radius); flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      font-size: 56px; position: relative; overflow: hidden;
      border: 1px solid var(--border);
    }
    .content-info { flex: 1; min-width: 260px; }
    .content-title {
      font-family: 'Syne', sans-serif;
      font-size: 30px; font-weight: 800;
      letter-spacing: -0.03em; margin-bottom: 10px;
    }
    .content-meta-row { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 14px; }
    .content-stats-row {
      display: flex; gap: 20px; flex-wrap: wrap; margin-bottom: 20px;
      font-size: 13px; color: var(--text-2);
    }
    .content-stats-row .stat-item strong {
      color: var(--text-1); font-family: 'JetBrains Mono', monospace;
    }
    .my-star-row { display: flex; gap: 6px; align-items: center; margin-top: 14px; }
    .my-star {
      font-size: 22px; background: none; border: none; cursor: pointer;
      filter: grayscale(0.75); transition: transform 0.15s, filter 0.15s;
      padding: 0 2px; line-height: 1;
    }
    .my-star:hover, .my-star.active { filter: grayscale(0); transform: scale(1.2); }

    /* LAYOUT */
    .detail-grid {
      display: grid; grid-template-columns: 1fr 340px;
      gap: 24px; margin-bottom: 48px;
    }
    @media (max-width: 900px) { .detail-grid { grid-template-columns: 1fr; } }

    /* AI SUMMARY */
    .ai-summary-box {
      background: linear-gradient(135deg, rgba(108,0,255,0.07) 0%, rgba(0,212,255,0.04) 100%);
      border: 1px solid var(--border-acc);
      border-radius: var(--radius);
      padding: 20px 24px; margin-bottom: 24px;
    }
    .ai-summary-head {
      display: flex; align-items: center; gap: 8px; margin-bottom: 10px;
      font-size: 13px; font-weight: 700;
    }
    .ai-summary-text { font-size: 14px; color: var(--text-1); line-height: 1.7; }
    .ai-summary-meta { font-size: 10px; color: var(--text-muted); margin-top: 10px; }

    /* SENTIMENT (Sprint 26) */
    .sentiment-bar-wrap { margin-top: 14px; }
    .sentiment-bar {
      display: flex; height: 9px; border-radius: 5px; overflow: hidden;
      background: rgba(255,255,255,0.05);
    }
    .sentiment-bar .seg-poz { background: linear-gradient(90deg, #00FF87, #00D470); }
    .sentiment-bar .seg-notr { background: rgba(255,255,255,0.18); }
    .sentiment-bar .seg-neg { background: linear-gradient(90deg, #FF6B6B, #FF4D4D); }
    .sentiment-legend {
      display: flex; gap: 14px; flex-wrap: wrap;
      margin-top: 7px; font-size: 11px; color: var(--text-muted);
    }
    .comment-sentiment {
      font-size: 13px; margin-left: 6px; cursor: default;
    }

    /* RATING DIST */
    .dist-row { display: flex; align-items: center; gap: 10px; margin-bottom: 7px; }
    .dist-stars { font-size: 11px; width: 66px; color: var(--text-muted); font-family: 'JetBrains Mono', monospace; }
    .dist-track { flex: 1; height: 7px; background: rgba(255,255,255,0.05); border-radius: 4px; overflow: hidden; }
    .dist-fill  { height: 100%; background: linear-gradient(90deg, #FFC107, #FF9800); border-radius: 4px; }
    .dist-count { font-size: 11px; width: 24px; text-align: right; color: var(--text-muted); font-family: 'JetBrains Mono', monospace; }

    /* SIMILAR */
    .similar-item {
      display: flex; gap: 12px; align-items: center;
      padding: 10px; margin: 0 -10px;
      border-radius: var(--radius-sm);
      text-decoration: none; transition: background 0.15s;
    }
    .similar-item:hover { background: rgba(255,255,255,0.03); }
    .similar-thumb {
      width: 68px; height: 42px; border-radius: 6px; flex-shrink: 0;
      display: flex; align-items: center; justify-content: center; font-size: 18px;
    }
    .similar-title { font-size: 13px; font-weight: 600; color: var(--text-1); line-height: 1.3; }
    .similar-meta  { font-size: 11px; color: var(--text-muted); margin-top: 2px; }

    /* COMMENTS */
    .comment-item {
      display: flex; gap: 12px; align-items: flex-start;
      padding: 14px 0; border-bottom: 1px solid rgba(255,255,255,0.04);
    }
    .comment-item:last-child { border-bottom: none; }
    .comment-avatar {
      width: 32px; height: 32px; border-radius: 50%;
      background: rgba(108,0,255,0.15); border: 1px solid rgba(108,0,255,0.25);
      display: flex; align-items: center; justify-content: center;
      font-size: 13px; font-weight: 700; color: #a78bfa; flex-shrink: 0;
      font-family: 'Syne', sans-serif;
    }
    .comment-user { font-size: 13px; font-weight: 600; color: var(--text-1); }
    .comment-time { font-size: 10px; color: var(--text-muted); margin-left: 8px; }
    .comment-text { font-size: 13px; color: var(--text-2); line-height: 1.55; margin-top: 3px; }

    .series-ep-chip {
      display: inline-flex; align-items: center; gap: 5px;
      background: rgba(255,255,255,0.04); border: 1px solid var(--border);
      border-radius: 100px; padding: 4px 12px; font-size: 12px;
      color: var(--text-2); text-decoration: none; margin: 0 6px 6px 0;
      transition: border-color 0.15s, color 0.15s;
    }
    .series-ep-chip:hover { border-color: var(--border-acc); color: var(--accent-1); }
    .series-ep-chip.current { border-color: var(--border-acc); color: var(--accent-1); }
  </style>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
  <script src="https://unpkg.com/lenis@1.1.14/dist/lenis.min.js"></script>
</head>
<body>
  <div id="scroll-progress"></div>
  <div class="noise-overlay"></div>
  <div class="cursor-dot"></div>
  <div class="cursor-halo"></div>

  <nav class="navbar">
    <a href="catalog.html" class="nav-logo">GE Engine</a>
    <ul class="nav-links">
      <li><a href="catalog.html">Katalog</a></li>
      <li><a href="panel.html">Panelim</a></li>
      <li><a href="leaderboard.html">Sıralama</a></li>
      <li><a href="profile.html">Profil</a></li>
      <li><a href="social.html">Sosyal</a></li>
      <li id="nav-admin-link" style="display:none"><a href="admin.html">Admin</a></li>
    </ul>
    <div class="nav-right">
      <div class="points-pill" id="nav-points">⚡ — puan</div>
      <span class="nav-username" id="nav-username"></span>
      <a class="nav-logout" id="nav-logout" href="#">Çıkış</a>
    </div>
  </nav>

  <div class="page-content">
    <div class="container">

      <!-- HERO -->
      <div class="content-hero will-animate">
        <div class="content-thumb-lg" id="c-thumb">🎬</div>
        <div class="content-info">
          <div class="content-title" id="c-title">—</div>
          <div class="content-meta-row" id="c-meta"></div>
          <div class="content-stats-row">
            <span class="stat-item">👁 <strong id="c-watches">—</strong> izlenme</span>
            <span class="stat-item">⭐ <strong id="c-rating">—</strong> (<span id="c-rating-cnt">0</span> oy)</span>
            <span class="stat-item">💬 <strong id="c-comments">—</strong> yorum</span>
            <span class="stat-item">✅ <strong id="c-completions">—</strong> tamamlama</span>
          </div>
          <div id="c-series" style="display:none;margin-bottom:14px">
            <div style="font-size:11px;color:var(--text-muted);margin-bottom:8px">📺 SERİNİN BÖLÜMLERİ</div>
            <div id="c-series-eps"></div>
          </div>
          <a class="btn-primary" id="btn-watch" href="#" style="font-size:15px;padding:12px 32px">▶ İzlemeye Başla</a>
          <div class="my-star-row">
            <span style="font-size:12px;color:var(--text-muted)">Senin oyun:</span>
            <button class="my-star" data-val="1">⭐</button>
            <button class="my-star" data-val="2">⭐</button>
            <button class="my-star" data-val="3">⭐</button>
            <button class="my-star" data-val="4">⭐</button>
            <button class="my-star" data-val="5">⭐</button>
          </div>
        </div>
      </div>

      <div class="detail-grid">
        <!-- SOL: AI ÖZET + YORUMLAR -->
        <div>
          <div class="ai-summary-box will-animate">
            <div class="ai-summary-head">
              <span>🤖 Topluluk Ne Diyor?</span>
              <span class="badge-chip" id="ai-summary-badge" style="font-size:10px">AI</span>
            </div>
            <div class="ai-summary-text" id="ai-summary-text"><div class="spinner"></div></div>
            <div class="ai-summary-meta" id="ai-summary-meta"></div>
            <div class="sentiment-bar-wrap" id="sentiment-wrap" style="display:none">
              <div class="sentiment-bar" id="sentiment-bar"></div>
              <div class="sentiment-legend" id="sentiment-legend"></div>
            </div>
          </div>

          <div class="card will-animate">
            <div class="section-header">
              <div class="section-title">💬 Yorumlar</div>
            </div>
            <div style="margin-bottom:16px">
              <textarea class="form-input" id="comment-input" rows="2"
                placeholder="Bu içerik hakkında ne düşünüyorsun?"
                style="resize:none;width:100%;box-sizing:border-box;font-size:13px"></textarea>
              <button class="btn-primary" id="btn-add-comment" style="margin-top:8px;font-size:13px">💬 Yorum Yap</button>
            </div>
            <div id="comment-list"><div class="spinner"></div></div>
          </div>
        </div>

        <!-- SAĞ: DAĞILIM + BENZER -->
        <aside>
          <div class="card will-animate" style="margin-bottom:20px">
            <div class="section-header">
              <div class="section-title">⭐ Puan Dağılımı</div>
            </div>
            <div id="rating-dist"><div class="spinner"></div></div>
          </div>

          <div class="card will-animate">
            <div class="section-header">
              <div class="section-title">🎬 Benzer Videolar</div>
            </div>
            <div id="similar-list"><div class="spinner"></div></div>
          </div>
        </aside>
      </div>

    </div>
  </div>

  <div id="toast-container"></div>

  <script src="js/api.js"></script>
  <script src="js/global.js"></script>
  <script src="js/notifications.js"></script>
  <script>
    initPage();
    initNotifications();
    if (Auth.getRole() === 'admin') document.getElementById('nav-admin-link').style.display = '';

    const params    = new URLSearchParams(window.location.search);
    const contentId = params.get('id');
    if (!contentId) window.location.href = 'catalog.html';

    const GENRE_ICONS = {
      animasyon:'🎨', 'bilim-kurgu':'🚀', fantastik:'🧙',
      macera:'🗺️', belgesel:'🎥', otomobil:'🏎️'
    };

    function relTime(ts) {
      if (!ts) return '';
      const diff = (Date.now() - new Date(ts)) / 1000;
      if (diff < 60)    return `${Math.round(diff)}s önce`;
      if (diff < 3600)  return `${Math.round(diff/60)}dk önce`;
      if (diff < 86400) return `${Math.round(diff/3600)}sa önce`;
      return `${Math.round(diff/86400)}g önce`;
    }

    function setMyStars(n) {
      document.querySelectorAll('.my-star').forEach((s, i) => {
        s.classList.toggle('active', i < n);
      });
    }

    // ── DETAY ────────────────────────────────────────────
    async function loadDetail() {
      try {
        const d = await API.getContentDetail(contentId);
        const c = d.content;

        document.title = `${c.title} — Gamification Engine`;
        document.getElementById('c-title').textContent = c.title;
        document.getElementById('btn-watch').href = `watch.html?id=${encodeURIComponent(c.id)}`;

        const thumb = document.getElementById('c-thumb');
        thumb.textContent = GENRE_ICONS[c.genre] || '🎬';
        thumb.style.background = `linear-gradient(135deg, ${c.thumbnail_color}30 0%, #0D0D1800 100%)`;
        thumb.style.borderColor = `${c.thumbnail_color}50`;

        document.getElementById('c-meta').innerHTML = `
          <span class="genre-chip">${c.genre}</span>
          <span class="duration-chip">${Math.round(c.duration_minutes)} dk</span>
          <span class="duration-chip">${c.content_type}</span>
          ${c.episode_number ? `<span class="duration-chip">Bölüm ${c.episode_number}</span>` : ''}`;

        document.getElementById('c-watches').textContent     = d.watch_count;
        document.getElementById('c-rating').textContent      = d.avg_rating > 0 ? d.avg_rating : '—';
        document.getElementById('c-rating-cnt').textContent  = d.rating_count;
        document.getElementById('c-comments').textContent    = d.comment_count;
        document.getElementById('c-completions').textContent = d.completions;

        if (d.my_rating) setMyStars(d.my_rating);

        // Seri bölümleri
        if (d.series_episodes.length > 1) {
          document.getElementById('c-series').style.display = '';
          document.getElementById('c-series-eps').innerHTML = d.series_episodes.map(e => `
            <a class="series-ep-chip ${e.id === c.id ? 'current' : ''}"
               href="content.html?id=${encodeURIComponent(e.id)}">
              ${e.episode_number ? 'B' + e.episode_number : ''} ${e.title}
            </a>`).join('');
        }

        // Duygu dağılımı (Sprint 26) — sadece GPT-4o ile etiketlenmiş yorumlardan
        if (d.sentiment && d.sentiment.analyzed > 0) {
          const s = d.sentiment, dist = s.distribution;
          const pct = k => Math.round(dist[k] / s.analyzed * 100);
          document.getElementById('sentiment-wrap').style.display = '';
          document.getElementById('sentiment-bar').innerHTML = `
            ${dist.pozitif ? `<div class="seg-poz" style="width:${pct('pozitif')}%"></div>` : ''}
            ${dist.notr    ? `<div class="seg-notr" style="width:${pct('notr')}%"></div>` : ''}
            ${dist.negatif ? `<div class="seg-neg" style="width:${pct('negatif')}%"></div>` : ''}`;
          document.getElementById('sentiment-legend').innerHTML = `
            <span>😊 %${pct('pozitif')} pozitif</span>
            <span>😐 %${pct('notr')} nötr</span>
            <span>😞 %${pct('negatif')} negatif</span>
            <span style="margin-left:auto">${s.analyzed}/${s.total} yorum GPT-4o ile analiz edildi</span>`;
        }

        // Puan dağılımı
        document.getElementById('rating-dist').innerHTML = d.rating_dist.map(r => `
          <div class="dist-row">
            <span class="dist-stars">${'⭐'.repeat(r.stars)}</span>
            <div class="dist-track"><div class="dist-fill" style="width:${r.pct}%"></div></div>
            <span class="dist-count">${r.count}</span>
          </div>`).join('') +
          (d.rating_count === 0 ? '<p style="font-size:12px;color:var(--text-muted);margin-top:8px">Henüz oy yok</p>' : '');

        // Benzer videolar
        const sim = document.getElementById('similar-list');
        sim.innerHTML = d.similar.length ? d.similar.map(s => `
          <a class="similar-item" href="content.html?id=${encodeURIComponent(s.id)}">
            <div class="similar-thumb" style="background:${s.thumbnail_color}25;border:1px solid ${s.thumbnail_color}40">
              ${GENRE_ICONS[s.genre] || '🎬'}
            </div>
            <div>
              <div class="similar-title">${s.title}</div>
              <div class="similar-meta">
                ${Math.round(s.duration_minutes)} dk · 👁 ${s.watches}
                ${s.avg_rating > 0 ? ' · ⭐ ' + s.avg_rating : ''}
              </div>
            </div>
          </a>`).join('')
          : '<p style="font-size:12px;color:var(--text-muted)">Aynı türde başka video yok.</p>';

      } catch (e) {
        showToast({ title: 'İçerik yüklenemedi', msg: e.message, icon: '⚠️' });
      }
    }

    // ── AI TOPLULUK ÖZETİ ────────────────────────────────
    async function loadReviewSummary() {
      const textEl  = document.getElementById('ai-summary-text');
      const metaEl  = document.getElementById('ai-summary-meta');
      const badgeEl = document.getElementById('ai-summary-badge');
      try {
        const d = await API.getReviewSummary(contentId);
        textEl.textContent  = d.summary;
        badgeEl.textContent = d.llm_enhanced ? '⚡ GPT-4o' : 'Özet';
        metaEl.textContent  =
          `${d.comment_count} yorum · ${d.rating_count} oy` +
          (d.cached ? ' · önbellekten' : '') +
          (d.llm_enhanced ? ` · ${d.model}` : '');
      } catch (e) {
        textEl.textContent = e.message;
      }
    }

    // ── YORUMLAR ─────────────────────────────────────────
    async function loadComments() {
      const el = document.getElementById('comment-list');
      try {
        const d = await API.getComments(contentId);
        if (!d.comments.length) {
          el.innerHTML = '<p style="font-size:13px;color:var(--text-muted)">İlk yorumu sen yap!</p>';
          return;
        }
        const SENT_EMOJI = { pozitif: '😊', negatif: '😞', notr: '😐' };
        el.innerHTML = d.comments.map(c => `
          <div class="comment-item">
            <div class="comment-avatar">${(c.username||'?')[0].toUpperCase()}</div>
            <div style="flex:1;min-width:0">
              <div>
                <a class="comment-user lb-username" href="profile.html?u=${encodeURIComponent(c.username)}">${c.username}</a>
                <span class="comment-time">${relTime(c.created_at)}</span>
                ${c.sentiment ? `<span class="comment-sentiment" title="GPT-4o duygu analizi: ${c.sentiment}">${SENT_EMOJI[c.sentiment] || ''}</span>` : ''}
              </div>
              <div class="comment-text">${c.comment.replace(/</g,'&lt;')}</div>
            </div>
          </div>`).join('');
      } catch (e) {
        el.innerHTML = `<p style="color:var(--danger);font-size:13px">${e.message}</p>`;
      }
    }

    document.getElementById('btn-add-comment').addEventListener('click', async () => {
      const input   = document.getElementById('comment-input');
      const comment = input.value.trim();
      if (comment.length < 3) { showToast({ title: 'En az 3 karakter yaz', icon: '⚠️' }); return; }
      const btn = document.getElementById('btn-add-comment');
      btn.disabled = true; btn.textContent = 'Ekleniyor…';
      try {
        await API.addComment(contentId, comment);
        input.value = '';
        showToast({ title: 'Yorum eklendi!', icon: '💬' });
        loadComments();
        loadReviewSummary();  // yeni yorum → özet tazelenir (hash değişti)
      } catch (e) {
        showToast({ title: 'Hata', msg: e.message, icon: '⚠️' });
      } finally {
        btn.disabled = false; btn.textContent = '💬 Yorum Yap';
      }
    });

    // ── HIZLI OYLAMA ─────────────────────────────────────
    document.querySelectorAll('.my-star').forEach(btn => {
      btn.addEventListener('click', async () => {
        const val = parseInt(btn.dataset.val);
        setMyStars(val);
        try {
          const d = await API.rateContent(contentId, val, null);
          showToast({
            title: `⭐ ${d.message}`,
            msg:   `Yeni ortalama: ${d.avg_rating} (${d.rating_count} oy)`,
            icon:  '⭐',
          });
          if (d.new_achievements?.length) {
            d.new_achievements.forEach((a, i) => {
              setTimeout(() => showToast({
                title: `${a.icon} Başarım: ${a.name}`,
                msg:   `${a.description} (+${a.reward} puan)`,
                icon:  '🎖', duration: 6500,
              }), 600 + i * 700);
            });
          }
          document.getElementById('c-rating').textContent     = d.avg_rating;
          document.getElementById('c-rating-cnt').textContent = d.rating_count;
          loadReviewSummary();
        } catch (e) {
          showToast({ title: 'Hata', msg: e.message, icon: '⚠️' });
        }
      });
    });

    // INIT
    loadDetail();
    loadReviewSummary();
    loadComments();
  </script>
</body>
</html>
