# SPA + API reverse proxy. API paths mirror frontend/vite.config.ts.

upstream backend {
    server backend:8000;
}

server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # SPA fallback: client-side routes resolve to index.html.
    location / {
        try_files $uri /index.html;
    }

    location ~ ^/(auth|catalog|events|me|leaderboard|admin|health|explain)(/|$) {
        proxy_pass http://backend;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # SSE needs buffering off so events flush immediately.
    location /sse/ {
        proxy_pass http://backend;
        proxy_set_header Host $host;
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 3600s;
        add_header X-Accel-Buffering no;
    }
}
